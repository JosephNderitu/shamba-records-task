services:
  # ── Web Service ──────────────────────────────────────
  - type: web
    name: smartseason-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    branch: master
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: POSTGRES_DB
        fromDatabase:
          name: smartseason-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: smartseason-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: smartseason-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: smartseason-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: smartseason-db
          property: port
    healthCheckPath: /login/

  # ── PostgreSQL Database ───────────────────────────────
databases:
  - name: smartseason-db
    databaseName: smartseason_db
    user: smartseason_user
    plan: free