services:
  - type: web
    name: smartseason-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    branch: master
    autoDeploy: true
    healthCheckPath: /login/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: POSTGRES_DB
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"